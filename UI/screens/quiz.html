<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>心镜 · 答题 Quiz</title>
<link rel="stylesheet" href="_frame.css" />
</head>
<body>
<div class="grain"></div>
<div class="stage">
  <div class="caption">
    <div class="logo">心镜 · NINE MIRRORS</div>
    <div><a href="../index.html">← ALL SCREENS</a></div>
  </div>

  <div class="phone">
    <div class="screen quiz">
      <div class="statusbar"><span>9:41</span><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>
      <div class="s-body" style="padding-bottom:0">
        <div class="progress-row">
          <button class="back">←</button>
          <div class="counter"><em>21</em> / 60</div>
          <div class="bar"></div>
        </div>
        <div class="q-scene">
          <div class="dim">维度 <em>E / I</em> · EXTRAVERSION</div>
          <div class="q-no">21.</div>
          <div class="q-text">周末有一整天空闲，你更倾向于——</div>
        </div>
        <div class="options">
          <button class="opt"><span class="k">A</span>约朋友逛街、吃饭，或者去新开的咖啡店打卡，让一天充满新鲜声响。</button>
          <button class="opt selected"><span class="k">B</span>一个人在家看书、看剧或者打游戏，享受只属于自己的那种独处时光。</button>
        </div>
        <div class="q-footer">
          <span class="chip">第一直觉 · TRUST</span>
          <span>选中后自动跳下一题</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <span><a href="intro.html" style="color:var(--ink); border-bottom:1px solid var(--hairline)">← INTRO</a></span>
    <span>03 / 07 · QUIZ</span>
    <span><a href="ad.html" style="color:var(--ink); border-bottom:1px solid var(--hairline)">UNLOCK →</a></span>
  </div>
</div>
</body>
</html>
